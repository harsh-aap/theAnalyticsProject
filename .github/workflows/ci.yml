name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build & Upload
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write  # required for OIDC auth to AWS
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o ingestion-server ./cmd/server/...

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        # Only runs on pushes to main — PRs just build the binary to validate it compiles.
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload binary to S3
        if: github.ref == 'refs/heads/main'
        run: |
          # Upload with SHA tag for rollbacks
          aws s3 cp ingestion-server \
            s3://${{ secrets.DEPLOY_BUCKET }}/ingestion-server/${{ github.sha }}/ingestion-server

          # Update the "latest" pointer
          aws s3 cp ingestion-server \
            s3://${{ secrets.DEPLOY_BUCKET }}/ingestion-server/latest/ingestion-server

          echo "Binary uploaded. Deploy with:"
          echo "  ./scripts/deploy.sh ${{ github.sha }}"

      - name: Deploy to ASG
        if: github.ref == 'refs/heads/main'
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh ${{ github.sha }}
